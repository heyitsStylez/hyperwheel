<div class="overlay" id="rovl">
  <div class="modal">
    <h3>Delete all trades?</h3>
    <p>This permanently removes everything from your tracker and cannot be undone.</p>
    <div class="mbtns">
      <button class="btn btn-g" onclick="closeReset()">Cancel</button>
      <button class="btn-d" style="padding:7px 16px;font-size:.78rem;border-radius:7px" onclick="doReset()">Yes, delete all</button>
    </div>
  </div>
</div>

<!-- MERGE LOTS MODAL -->
<div class="merge-overlay" id="merge-overlay">
  <div class="merge-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 id="merge-title" style="font-size:.95rem">Merge Lots</h3>
      <button onclick="closeMergeModal()" style="background:transparent;border:none;color:var(--mu2);font-size:1.2rem;cursor:pointer;padding:2px 6px">&#10005;</button>
    </div>
    <p style="font-size:.72rem;color:var(--mu2);margin-bottom:10px">
      Combines all open lots into a single lot with a weighted average cost basis. All call history is preserved and reassigned to the merged lot.
    </p>
    <div id="merge-preview"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-g" onclick="closeMergeModal()">Cancel</button>
      <button class="btn" style="background:var(--orange);color:var(--bg);border:none;font-weight:700" onclick="confirmMerge()">Merge Lots</button>
    </div>
  </div>
</div>
